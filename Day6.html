<!DOCTYPE html>
<html>
<head>
    <title>Document</title>
    <style>

        .parent{

            height: 300px;
            width: 80%;
            border: 2px solid rgb(0, 0, 0);
            position: relative;
            left: 30px;
        }

        .child{

            height: 300px;
            width: 80%;
            border: 2px solid red;
            position: absolute;
            left: 50px;
            top: 50px;
        }

    </style>
</head>
<body>
    
    <div class = "parent">

        <div class = "child">


        </div>

    </div>

</body>
</html>
