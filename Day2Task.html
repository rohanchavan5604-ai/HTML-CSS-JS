<!DOCTYPE html>
<html>
<head>
    <title>Course Application Form</title>
</head>
<body>

<center>

<h1>Course Application </h1>

<fieldset style="width:900px;">
    <legend>Application Form</legend>

    <form>
    <h3>Full Name :</h3>
    <input type="text" placeholder=" First name">
    <input type="text" placeholder=" Last name">

    <h3>Which Course Are You Applying For ?</h3>
    <input type="radio" name="course"> Java Fullstack
    <input type="radio" name="course"> Python Fullstack
    <input type="radio" name="course"> Data Science

    <h3>Date Of Birth : </h3>
    <input type="date">

        <h3>Gender: </h3>
        <input type="radio" name="gender"> Male
        <input type="radio" name="gender"> Female

        <h3>Education :</h3>
        <select>
            <option>Select Education</option>
            <option>12th</option>
            <option>Diploma</option>
            <option>BCA</option>
            <option>B.Tech</option>
            <option>MCA</option>
        </select>

        <h3>Email : </h3>
        <input type="email" placeholder="Enter Email" required>

        <h3>Contact Number: </h3>
        <input type="number" placeholder="Mobile Number">

        <h3>Address :</h3>

        <textarea rows="4" cols="40"
        placeholder="Street Address"> 
        </textarea>

        <br>   <br>

        <input type="text" placeholder="Address Line 2">

        <br>    <br>

        <input type="text" placeholder="City">

        <input type="text" placeholder="State">

        <br>    <br>

        <input type="number" placeholder="Zip Code">

        <select>
            <option>Country</option>
            <option  selected >  India </option>
            <option>Pakistan</option>
            <option>China</option>
            <option>Australia</option>
        </select>

        <br>   <br>
        <input type="submit" value="Submit">

    </form>
    </fieldset>
    </center>

</body>
</html>
